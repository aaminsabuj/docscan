<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DocScan</title>
<meta name="description" content="DocScan - Document Scanner App">
<meta name="theme-color" content="#0d0d0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DocScan">
<link rel="manifest" id="pwa-manifest">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --ink: #0d0d0d;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --amber: #e8a020;
    --amber-dark: #c4841a;
    --scan-green: #00e676;
    --danger: #ff3d3d;
    --shadow: rgba(0,0,0,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Grain texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999; opacity: 0.4;
  }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 14px;
    border-bottom: 2px solid var(--ink);
    background: var(--paper);
    position: relative; z-index: 10;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem; font-weight: 700; letter-spacing: -0.04em;
    display: flex; align-items: center; gap: 8px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--amber); border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.7; }
  }

  .scan-count {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem; color: #888;
    border: 1px solid #ccc; border-radius: 20px;
    padding: 3px 10px;
  }

  /* Main area */
  main {
    flex: 1; display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Viewfinder */
  #viewfinder-container {
    position: relative; flex: 1;
    background: #111;
    overflow: hidden;
    cursor: pointer;
  }

  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  #canvas { display: none; }

  /* Corner brackets overlay */
  .brackets {
    position: absolute; inset: 0;
    pointer-events: none;
  }

  .bracket {
    position: absolute; width: 28px; height: 28px;
    border-color: var(--amber);
    border-style: solid;
    transition: all 0.3s ease;
  }

  .bracket.tl { top: 18px; left: 18px; border-width: 3px 0 0 3px; }
  .bracket.tr { top: 18px; right: 18px; border-width: 3px 3px 0 0; }
  .bracket.bl { bottom: 18px; left: 18px; border-width: 0 0 3px 3px; }
  .bracket.br { bottom: 18px; right: 18px; border-width: 0 3px 3px 0; }

  #viewfinder-container.scanning .bracket {
    width: 36px; height: 36px;
    border-color: var(--scan-green);
  }

  /* Scan line */
  .scan-line {
    position: absolute; left: 12px; right: 12px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    top: 20%;
    opacity: 0;
    filter: blur(1px);
  }

  #viewfinder-container.live .scan-line {
    opacity: 1;
    animation: scandown 2.4s ease-in-out infinite;
  }

  @keyframes scandown {
    0% { top: 10%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: 88%; opacity: 0; }
  }

  /* Mode label */
  .mode-label {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.45);
    padding: 4px 12px; border-radius: 20px;
    backdrop-filter: blur(4px);
  }

  /* Camera placeholder */
  .camera-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px;
    background: #1a1a1a;
    color: rgba(255,255,255,0.5);
  }

  .camera-placeholder svg { opacity: 0.3; }

  .camera-placeholder p {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem; text-align: center; padding: 0 24px;
    line-height: 1.6;
  }

  /* Captured image */
  #captured-img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: none;
    background: #111;
    transition: filter 0.3s ease;
  }

  /* Controls bar */
  .controls {
    background: var(--ink);
    padding: 16px 20px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }

  /* Shutter button */
  .shutter {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--paper);
    border: 3px solid var(--paper);
    outline: 3px solid rgba(255,255,255,0.25);
    outline-offset: 4px;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: transform 0.1s, background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }

  .shutter:active { transform: scale(0.93); background: var(--amber); }

  .shutter svg { width: 22px; height: 22px; }

  /* Side buttons */
  .side-btn {
    width: 48px; height: 48px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.75);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }

  .side-btn:hover { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.35); }
  .side-btn svg { width: 20px; height: 20px; }

  /* Enhance strip */
  #enhance-strip {
    background: #171717;
    border-top: 1px solid #2a2a2a;
    padding: 10px 16px;
    display: none;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  #enhance-strip::-webkit-scrollbar { display: none; }

  #enhance-strip.visible { display: flex; }

  .filter-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid #333;
    background: transparent;
    color: rgba(255,255,255,0.65);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn.active, .filter-btn:hover {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--ink);
  }

  /* Gallery strip */
  #gallery-strip {
    background: #111;
    border-top: 1px solid #222;
    padding: 10px 16px;
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    min-height: 80px;
    align-items: center;
  }

  #gallery-strip::-webkit-scrollbar { display: none; }

  .gallery-thumb {
    width: 60px; height: 60px;
    border-radius: 6px;
    object-fit: cover;
    border: 2px solid transparent;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.2s, transform 0.2s;
  }

  .gallery-thumb:hover, .gallery-thumb.selected {
    border-color: var(--amber);
    transform: scale(1.06);
  }

  .gallery-empty {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: #444;
    text-align: center;
    width: 100%;
  }

  /* Toast */
  #toast {
    position: fixed; bottom: 200px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--paper);
    font-family: 'Space Mono', monospace; font-size: 0.7rem;
    padding: 8px 18px; border-radius: 20px;
    opacity: 0; transition: all 0.25s;
    pointer-events: none; z-index: 100;
    white-space: nowrap;
  }

  #toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }

  /* Retake button */
  #retake-btn {
    display: none;
    position: absolute; bottom: 14px; left: 14px;
    background: rgba(0,0,0,0.6); color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px; padding: 6px 14px;
    font-family: 'Space Mono', monospace; font-size: 0.65rem;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.15s;
  }

  #retake-btn:hover { background: rgba(0,0,0,0.85); }

  .flash {
    position: absolute; inset: 0;
    background: white; opacity: 0;
    pointer-events: none;
    z-index: 20;
  }

  .flash.animate {
    animation: flashburst 0.35s ease-out forwards;
  }

  @keyframes flashburst {
    0% { opacity: 0.9; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    DocScan
  </div>
  <div class="scan-count" id="scan-count">0 scans</div>
</header>

<main>
  <div id="viewfinder-container">
    <!-- Camera feed -->
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <!-- Captured image view -->
    <img id="captured-img" alt="Captured">

    <!-- Overlay elements -->
    <div class="brackets">
      <div class="bracket tl"></div>
      <div class="bracket tr"></div>
      <div class="bracket bl"></div>
      <div class="bracket br"></div>
    </div>
    <div class="scan-line"></div>
    <div class="mode-label" id="mode-label">READY TO SCAN</div>
    <button id="retake-btn">↩ Retake</button>
    <div class="flash" id="flash"></div>

    <!-- Placeholder shown if camera not available -->
    <div class="camera-placeholder" id="cam-placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="white"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm0 6a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm8-9h-3.17l-1.24-1.35A2 2 0 0 0 14.12 3H9.88a2 2 0 0 0-1.47.65L7.17 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2z"/></svg>
      <p id="placeholder-msg">Tap the shutter to start scanning.<br>Camera access required.</p>
      <button id="pick-file-btn" style="display:none;margin-top:8px;padding:10px 22px;background:#e8a020;color:#0d0d0d;border:none;border-radius:24px;font-family:'Space Mono',monospace;font-size:0.75rem;font-weight:700;cursor:pointer;letter-spacing:0.04em;">
        📁 Pick from Gallery
      </button>
      <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none">
    </div>
  </div>

  <!-- Enhance strip (visible after capture) -->
  <div id="enhance-strip">
    <button class="filter-btn active" data-filter="original">Original</button>
    <button class="filter-btn" data-filter="enhanced">Enhanced</button>
    <button class="filter-btn" data-filter="blackwhite">B&W Doc</button>
    <button class="filter-btn" data-filter="grayscale">Grayscale</button>
    <button class="filter-btn" data-filter="vivid">Vivid</button>
    <button class="filter-btn" data-filter="dark">Dark Mode</button>
  </div>

  <!-- Action controls -->
  <div class="controls">
    <!-- Gallery open -->
    <button class="side-btn" id="gallery-toggle-btn" title="Gallery">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 16V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2zm-11-4 2.03 2.71L16 11l4 5H8l3-4zM2 6v14a2 2 0 0 0 2 2h14v-2H4V6H2z"/></svg>
    </button>

    <!-- Shutter -->
    <button class="shutter" id="shutter-btn" title="Capture">
      <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/><path d="M9 2L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3.17L15 2H9zm3 15a6 6 0 1 1 0-12 6 6 0 0 1 0 12z"/></svg>
    </button>

    <!-- Download / Save -->
    <button class="side-btn" id="download-btn" title="Download">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
    </button>
  </div>

  <!-- Gallery strip -->
  <div id="gallery-strip">
    <span class="gallery-empty" id="gallery-empty">No scans yet</span>
  </div>
</main>

<div id="toast"></div>

<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const capturedImg = document.getElementById('captured-img');
  const shutterBtn = document.getElementById('shutter-btn');
  const retakeBtn = document.getElementById('retake-btn');
  const downloadBtn = document.getElementById('download-btn');
  const galleryStrip = document.getElementById('gallery-strip');
  const galleryEmpty = document.getElementById('gallery-empty');
  const galleryToggleBtn = document.getElementById('gallery-toggle-btn');
  const enhanceStrip = document.getElementById('enhance-strip');
  const flashEl = document.getElementById('flash');
  const modeLabel = document.getElementById('mode-label');
  const scanCount = document.getElementById('scan-count');
  const viewfinder = document.getElementById('viewfinder-container');
  const camPlaceholder = document.getElementById('cam-placeholder');

  let stream = null;
  let scans = [];
  let currentFilter = 'original';
  let currentCapture = null;
  let isLive = false;
  let galleryOpen = true;

  const FILTERS = {
    original: '',
    enhanced: 'contrast(1.18) brightness(1.08) saturate(1.1)',
    blackwhite: 'grayscale(1) contrast(1.5) brightness(1.1)',
    grayscale: 'grayscale(1)',
    vivid: 'saturate(1.6) contrast(1.12)',
    dark: 'brightness(0.78) contrast(1.25) saturate(0.85)',
  };

  const pickFileBtn = document.getElementById('pick-file-btn');
  const fileInput = document.getElementById('file-input');
  const placeholderMsg = document.getElementById('placeholder-msg');

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      video.srcObject = stream;
      video.style.display = 'block';
      camPlaceholder.style.display = 'none';
      viewfinder.classList.add('live');
      isLive = true;
      modeLabel.textContent = 'LIVE';
    } catch (e) {
      console.warn('Camera unavailable:', e);
      placeholderMsg.innerHTML = 'Camera access denied or not available.<br>Use the button below to pick a photo.';
      pickFileBtn.style.display = 'block';
    }
  }

  startCamera();

  // File picker fallback
  pickFileBtn.addEventListener('click', () => fileInput.click());
  shutterBtn.addEventListener('click', () => {
    if (!isLive) { fileInput.click(); return; }
    doCapture();
  });

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      currentCapture = e.target.result;
      showCapture(e.target.result);
      addToGallery(e.target.result);
      updateScanCount();
      toast('Photo loaded!');
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
  });

  function doCapture() {
    if (!stream) { toast('No camera stream'); return; }

    // Flash
    flashEl.classList.remove('animate');
    void flashEl.offsetWidth;
    flashEl.classList.add('animate');

    const vw = video.videoWidth || 1280;
    const vh = video.videoHeight || 720;
    canvas.width = vw;
    canvas.height = vh;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, vw, vh);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.92);

    currentCapture = dataUrl;
    showCapture(dataUrl);
    addToGallery(dataUrl);
    updateScanCount();
    toast('Captured!');
  }

  function showCapture(dataUrl) {
    capturedImg.src = dataUrl;
    capturedImg.style.display = 'block';
    video.style.display = 'none';
    retakeBtn.style.display = 'block';
    enhanceStrip.classList.add('visible');
    viewfinder.classList.remove('live');
    viewfinder.classList.add('scanning');
    modeLabel.textContent = 'CAPTURED';
    currentFilter = 'original';
    setFilterActive('original');
    applyFilter('original');
  }

  function retake() {
    capturedImg.style.display = 'none';
    video.style.display = 'block';
    retakeBtn.style.display = 'none';
    enhanceStrip.classList.remove('visible');
    viewfinder.classList.remove('scanning');
    viewfinder.classList.add('live');
    modeLabel.textContent = 'LIVE';
    currentCapture = null;
  }

  function applyFilter(filter) {
    currentFilter = filter;
    capturedImg.style.filter = FILTERS[filter] || '';
  }

  function setFilterActive(filter) {
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.filter === filter);
    });
  }

  function addToGallery(dataUrl) {
    scans.unshift(dataUrl);
    galleryEmpty.style.display = 'none';

    const img = document.createElement('img');
    img.className = 'gallery-thumb';
    img.src = dataUrl;
    img.addEventListener('click', () => {
      currentCapture = dataUrl;
      showCapture(dataUrl);
      selectThumb(img);
    });

    // Remove old selected
    document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('selected'));
    img.classList.add('selected');

    galleryStrip.insertBefore(img, galleryStrip.firstChild);
  }

  function selectThumb(el) {
    document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('selected'));
    el.classList.add('selected');
  }

  function updateScanCount() {
    const n = scans.length;
    scanCount.textContent = n === 1 ? '1 scan' : `${n} scans`;
  }

  function downloadCurrent() {
    if (!currentCapture) { toast('Nothing to download'); return; }

    // Apply current filter to a canvas and download
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      const ctx = c.getContext('2d');

      if (currentFilter === 'blackwhite') {
        ctx.filter = 'grayscale(1) contrast(1.5) brightness(1.1)';
      } else if (currentFilter !== 'original') {
        ctx.filter = FILTERS[currentFilter] || '';
      }
      ctx.drawImage(img, 0, 0);

      const link = document.createElement('a');
      link.download = `scan_${Date.now()}.jpg`;
      link.href = c.toDataURL('image/jpeg', 0.92);
      link.click();
      toast('Saved to Downloads!');
    };
    img.src = currentCapture;
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // Events
  retakeBtn.addEventListener('click', retake);
  downloadBtn.addEventListener('click', downloadCurrent);

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const f = btn.dataset.filter;
      setFilterActive(f);
      applyFilter(f);
    });
  });

  galleryToggleBtn.addEventListener('click', () => {
    galleryOpen = !galleryOpen;
    galleryStrip.style.display = galleryOpen ? 'flex' : 'none';
  });

  // ── PWA: inject manifest dynamically ──
  const manifest = {
    name: "DocScan",
    short_name: "DocScan",
    description: "Document scanner with filters",
    start_url: ".",
    display: "standalone",
    orientation: "portrait",
    background_color: "#0d0d0d",
    theme_color: "#0d0d0d",
    icons: [{
      src: "data:image/svg+xml," + encodeURIComponent('<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 192 192\'><rect width=\'192\' height=\'192\' rx=\'32\' fill=\'%230d0d0d\'/><circle cx=\'96\' cy=\'96\' r=\'18\' fill=\'%23e8a020\'/><path d=\'M96 60a36 36 0 1 0 0 72 36 36 0 0 0 0-72zm0 56a20 20 0 1 1 0-40 20 20 0 0 1 0 40z\' fill=\'%23f5f0e8\'/><rect x=\'44\' y=\'44\' width=\'20\' height=\'6\' rx=\'3\' fill=\'%23e8a020\'/><rect x=\'44\' y=\'44\' width=\'6\' height=\'20\' rx=\'3\' fill=\'%23e8a020\'/><rect x=\'128\' y=\'44\' width=\'20\' height=\'6\' rx=\'3\' fill=\'%23e8a020\'/><rect x=\'142\' y=\'44\' width=\'6\' height=\'20\' rx=\'3\' fill=\'%23e8a020\'/><rect x=\'44\' y=\'142\' width=\'20\' height=\'6\' rx=\'3\' fill=\'%23e8a020\'/><rect x=\'44\' y=\'128\' width=\'6\' height=\'20\' rx=\'3\' fill=\'%23e8a020\'/><rect x=\'128\' y=\'142\' width=\'20\' height=\'6\' rx=\'3\' fill=\'%23e8a020\'/><rect x=\'142\' y=\'128\' width=\'6\' height=\'20\' rx=\'3\' fill=\'%23e8a020\'/></svg>'),
      sizes: "192x192", type: "image/svg+xml", purpose: "any maskable"
    }]
  };
  const mBlob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  document.getElementById('pwa-manifest').href = URL.createObjectURL(mBlob);

  // ── PWA: service worker (offline support) ──
  if ('serviceWorker' in navigator) {
    const swSrc = `const CACHE='docscan-v1';self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
    const swBlob = new Blob([swSrc], {type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob), {scope:'./'})
      .then(()=>console.log('SW ok')).catch(()=>{});
  }

  // ── PWA: install banner ──
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferredPrompt = e;
    const b = document.createElement('div');
    b.innerHTML = '<span style="flex:1">📲 Add DocScan to your home screen</span><button id="ib-yes" style="background:#e8a020;color:#0d0d0d;border:none;border-radius:8px;padding:6px 14px;font-family:Space Mono,monospace;font-size:0.7rem;cursor:pointer;flex-shrink:0">Install</button><button id="ib-no" style="background:none;color:#888;border:none;font-size:1rem;cursor:pointer;flex-shrink:0">✕</button>';
    Object.assign(b.style, {position:'fixed',bottom:'185px',left:'10px',right:'10px',background:'#0d0d0d',color:'#f5f0e8',borderRadius:'12px',padding:'12px 14px',display:'flex',alignItems:'center',gap:'10px',fontFamily:"'Space Mono',monospace",fontSize:'0.7rem',zIndex:'200',boxShadow:'0 4px 24px rgba(0,0,0,0.45)',border:'1px solid #333'});
    document.body.appendChild(b);
    document.getElementById('ib-yes').onclick = () => { b.remove(); deferredPrompt && deferredPrompt.prompt(); };
    document.getElementById('ib-no').onclick = () => b.remove();
  });

</script>
</body>
